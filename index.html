<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kennzeichen Erkannt</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 30%, #1a6bb5 0%, #0d4a8a 40%, #072d5e 100%);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated light sweep at top */
    body::before {
      content: '';
      position: fixed;
      top: -60px;
      left: 10%;
      width: 80%;
      height: 120px;
      background: radial-gradient(ellipse, rgba(255,180,60,.55) 0%, rgba(255,120,0,.2) 40%, transparent 70%);
      border-radius: 50%;
      filter: blur(8px);
      animation: sweep 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes sweep {
      0%, 100% { opacity: .7; transform: scaleX(1); }
      50% { opacity: 1; transform: scaleX(1.1); }
    }

    /* Pixel dust particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 2px;
      animation: float linear infinite;
      opacity: 0;
    }

    @keyframes float {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
      10%  { opacity: 1; }
      90%  { opacity: .6; }
      100% { opacity: 0; transform: translateY(-120vh) rotate(360deg); }
    }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 40px;
      width: 100%;
      max-width: 780px;
    }

    /* ── Title ── */
    .title {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(36px, 7vw, 72px);
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: .06em;
      text-shadow: 0 2px 30px rgba(0,0,0,.5);
      margin-bottom: 48px;
      opacity: 0;
      animation: fade-down .7s .1s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes fade-down {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Plate frame ── */
    .plate-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
      opacity: 0;
      animation: fade-up .7s .25s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .plate {
      display: flex;
      align-items: stretch;
      background: #f0f0f0;
      border-radius: 10px;
      border: 3px solid #bbb;
      box-shadow:
              0 0 0 1px rgba(0,0,0,.15),
              0 8px 32px rgba(0,0,0,.45),
              inset 0 1px 0 rgba(255,255,255,.8);
      overflow: hidden;
      min-width: 420px;
      max-width: 620px;
      width: 100%;
      transition: all .5s cubic-bezier(.22,1,.36,1);
    }

    .plate.flash {
      box-shadow:
              0 0 0 1px rgba(0,0,0,.15),
              0 8px 60px rgba(255,220,80,.8),
              0 0 80px rgba(255,200,0,.4),
              inset 0 1px 0 rgba(255,255,255,.8);
    }

    /* EU strip */
    .plate-eu {
      background: linear-gradient(180deg, #1a3faa 0%, #1535a0 100%);
      width: 52px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 4px;
    }

    .eu-stars {
      font-size: 9px;
      line-height: 1.2;
      text-align: center;
      color: #f5d020;
      letter-spacing: 1px;
    }

    .eu-country {
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .05em;
      margin-top: 2px;
    }

    /* Plate text */
    .plate-text {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 24px;
      font-family: 'Oswald', sans-serif;
      font-size: clamp(40px, 8vw, 68px);
      font-weight: 700;
      color: #111;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: all .4s ease;
      min-height: 90px;
    }

    .plate-text.waiting {
      color: #aaa;
      font-size: 22px;
      letter-spacing: .05em;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
    }

    /* ── Badge ── */
    .badge-wrap {
      display: flex;
      justify-content: center;
      opacity: 0;
      animation: fade-up .7s .4s cubic-bezier(.22,1,.36,1) forwards;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #1a6bb5 0%, #0d4a8a 100%);
      border: 2px solid rgba(255,255,255,.2);
      border-radius: 40px;
      padding: 10px 22px 10px 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }

    .badge-icon {
      width: 34px;
      height: 34px;
      background: #f5a623;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(245,166,35,.4);
    }

    .badge-text {
      text-align: left;
    }

    .badge-text .line1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .badge-text .line2 {
      font-size: 13px;
      font-weight: 700;
      color: #f5a623;
      letter-spacing: .02em;
    }

    /* ── Meta info ── */
    .meta {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fade-up .7s .55s cubic-bezier(.22,1,.36,1) forwards;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .meta-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
    }

    .meta-value {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,.9);
      font-variant-numeric: tabular-nums;
    }

    .meta-sep {
      width: 1px;
      background: rgba(255,255,255,.15);
      align-self: stretch;
      margin: 4px 0;
    }

    /* Status dot */
    .status {
      position: fixed;
      top: 20px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 100;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      transition: background .3s;
    }
    .dot.live { background: #3fb950; box-shadow: 0 0 8px #3fb950; animation: pulse 2s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    .status-text {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
    }

    /* Total counter */
    .total-badge {
      position: fixed;
      top: 20px;
      left: 24px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,.5);
      letter-spacing: .08em;
      z-index: 100;
    }
    .total-badge span { color: rgba(255,255,255,.9); }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="status">
  <div class="dot" id="dot"></div>
  <div class="status-text" id="statusText">Connecting…</div>
</div>

<div class="total-badge">READS: <span id="totalCount">0</span></div>

<div class="card">
  <div class="title">Kennzeichen Erkannt</div>

  <div class="plate-wrap">
    <div class="plate" id="plate">
      <div class="plate-eu">
        <div class="eu-stars">★ ★ ★<br>★ ★ ★<br>★ ★ ★</div>
        <div class="eu-country">D</div>
      </div>
      <div class="plate-text waiting" id="plateText">Awaiting detection…</div>
    </div>
  </div>

  <div class="badge-wrap">
    <div class="badge">
      <div class="badge-icon">✓</div>
      <div class="badge-text">
        <div class="line1">Geeignet für den</div>
        <div class="line2">Zulassungs-Readiness-Check</div>
      </div>
    </div>
  </div>

  <div class="meta">
    <div class="meta-item">
      <div class="meta-label">Camera</div>
      <div class="meta-value" id="metaCamera">—</div>
    </div>
    <div class="meta-sep"></div>
    <div class="meta-item">
      <div class="meta-label">Confidence</div>
      <div class="meta-value" id="metaConf">—</div>
    </div>
    <div class="meta-sep"></div>
    <div class="meta-item">
      <div class="meta-label">Region</div>
      <div class="meta-value" id="metaRegion">—</div>
    </div>
    <div class="meta-sep"></div>
    <div class="meta-item">
      <div class="meta-label">Time</div>
      <div class="meta-value" id="metaTime">—</div>
    </div>
  </div>
</div>

<script>
  // ── Particles ─────────────────────────────────────────────────────────────
  const colors = ['#f5d020','#f5a623','#4a90d9','#7eb8f7','#fff'];
  const container = document.getElementById('particles');
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 8;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${20 + Math.random()*80}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${6 + Math.random()*10}s;
      animation-delay:${Math.random()*8}s;
      opacity:0;
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    container.appendChild(p);
  }

  // ── SSE ───────────────────────────────────────────────────────────────────
  let totalReads = 0;

  function showPlate(read) {
    const plate = read.plates?.[0];
    const plateEl = document.getElementById('plateText');
    const plateFrame = document.getElementById('plate');

    if (plate && plate.plate && plate.plate !== '—') {
      plateEl.className = 'plate-text';
      plateEl.textContent = plate.plate;
    } else {
      plateEl.className = 'plate-text waiting';
      plateEl.textContent = 'No plate detected';
    }

    // Flash effect
    plateFrame.classList.add('flash');
    setTimeout(() => plateFrame.classList.remove('flash'), 1000);

    // Meta
    document.getElementById('metaCamera').textContent = read.camera !== 'Unknown camera' ? read.camera : '—';
    document.getElementById('metaConf').textContent = plate?.score != null ? plate.score + '%' : '—';
    document.getElementById('metaRegion').textContent = plate?.region ? plate.region.toUpperCase() : '—';
    document.getElementById('metaTime').textContent = new Date(read.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }

  function connect() {
    const es = new EventSource('/events');

    es.onopen = () => {
      document.getElementById('dot').className = 'dot live';
      document.getElementById('statusText').textContent = 'Live';
    };

    es.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'init') {
        totalReads = msg.reads.length;
        document.getElementById('totalCount').textContent = totalReads;
        if (msg.reads.length > 0) showPlate(msg.reads[0]);
      }

      if (msg.type === 'new_read') {
        totalReads++;
        document.getElementById('totalCount').textContent = totalReads;
        showPlate(msg.read);
      }

      if (msg.type === 'cleared') {
        totalReads = 0;
        document.getElementById('totalCount').textContent = 0;
        document.getElementById('plateText').className = 'plate-text waiting';
        document.getElementById('plateText').textContent = 'Awaiting detection…';
        document.getElementById('metaCamera').textContent = '—';
        document.getElementById('metaConf').textContent = '—';
        document.getElementById('metaRegion').textContent = '—';
        document.getElementById('metaTime').textContent = '—';
      }
    };

    es.onerror = () => {
      document.getElementById('dot').className = 'dot';
      document.getElementById('statusText').textContent = 'Reconnecting…';
      es.close();
      setTimeout(connect, 3000);
    };
  }

  connect();
</script>
</body>
</html>
